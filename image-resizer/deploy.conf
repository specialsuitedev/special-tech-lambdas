FUNCTION_NAME="special-tech-image-resizer"
ROLE_NAME="special-tech-image-resizer-role"
DESCRIPTION="Compresses and resizes work-order images uploaded to S3 by the mobile app"
RUNTIME="nodejs22.x"
HANDLER="index.handler"
MEMORY=512
TIMEOUT=30

# Called by deploy.sh after the IAM role is created/verified.
# Attaches the inline S3 policy the Lambda needs to read/write/delete images.
setup_iam() {
  local S3_POLICY
  S3_POLICY=$(cat <<EOF
{
  "Version": "2012-10-17",
  "Statement": [{
    "Sid": "S3ImageResizerAccess",
    "Effect": "Allow",
    "Action": ["s3:GetObject", "s3:PutObject", "s3:DeleteObject"],
    "Resource": "arn:aws:s3:::${BUCKET}/work-orders/*"
  }]
}
EOF
)
  aws iam put-role-policy \
    --role-name "$ROLE_NAME" \
    --policy-name "S3ImageResizerAccess" \
    --policy-document "$S3_POLICY"
  echo "   S3 inline policy attached."
}

# Called by deploy.sh after the Lambda is created/updated.
# Grants S3 invoke permission and configures the bucket notification trigger.
post_deploy() {
  local LAMBDA_ARN="arn:aws:lambda:${REGION}:${ACCOUNT_ID}:function:${FUNCTION_NAME}"

  # Grant S3 permission to invoke this Lambda
  aws lambda add-permission \
    --function-name "$FUNCTION_NAME" \
    --statement-id "S3InvokeImageResizer" \
    --action "lambda:InvokeFunction" \
    --principal "s3.amazonaws.com" \
    --source-arn "arn:aws:s3:::${BUCKET}" \
    --region "$REGION" \
    2>/dev/null || echo "   S3 invoke permission already exists."

  # Configure S3 event notification: PUT on work-orders/* → Lambda.
  # We only use prefix (suffix "/originals/" would match keys ending with that string;
  # object keys end with the filename e.g. .jpg, so suffix would never match and the Lambda would never run).
  # The Lambda handler skips keys that do not contain "/originals/" in the path.
  local NOTIFICATION_CONFIG
  NOTIFICATION_CONFIG=$(cat <<EOF
{
  "LambdaFunctionConfigurations": [{
    "Id": "ImageResizerTrigger",
    "LambdaFunctionArn": "${LAMBDA_ARN}",
    "Events": ["s3:ObjectCreated:Put"],
    "Filter": {
      "Key": {
        "FilterRules": [
          { "Name": "prefix", "Value": "work-orders/" }
        ]
      }
    }
  }]
}
EOF
)
  aws s3api put-bucket-notification-configuration \
    --bucket "$BUCKET" \
    --notification-configuration "$NOTIFICATION_CONFIG"
  echo "   S3 trigger configured."
}
